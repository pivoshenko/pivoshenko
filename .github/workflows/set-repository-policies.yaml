name: Set Repository Policies

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  set-repository-policies:
    name: Set Repository Policies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"

      - name: Run repository policies script
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run python scripts/set_repository_policies.py
