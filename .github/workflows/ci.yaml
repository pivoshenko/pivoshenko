name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: just install

      - name: Run linters
        run: just lint

      - name: Run audit
        run: just audit

      - name: Run tests
        run: |
          if [ -f ".no-tests" ]; then
            echo "Skipping — .no-tests sentinel present"
          else
            just test
          fi
